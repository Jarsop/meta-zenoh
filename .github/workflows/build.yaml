name: Zenoh Yocto Build

on:
  push:
    branches:
      - master
    paths-ignore:
      - "**.md"
      - .gitignore
  pull_request:
    branches:
      - master
    paths-ignore:
      - "**.md"
      - .gitignore
  workflow_dispatch:
    inputs:
      components:
        description: "Components to build"
        type: choice
        options:
          - all
          - zenoh
          - zenoh-pico
          - zenoh-c
          - zenoh-cpp
        default: all
      shared_memory:
        description: "Shared memory variants"
        type: choice
        options:
          - all
          - shm
          - no-shm
        default: all
      force_rebuild:
        description: "Force full rebuild (ignore cache)"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

env:
  SSTATE_ARTIFACT: sstate-cache-${{ github.run_id }}
  CACHE_KEY: yocto-sstate-${{ github.ref_name }}

jobs:
  warm-up:
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    outputs:
      sstate_artifact: ${{ env.SSTATE_ARTIFACT }}
      cache_key: ${{ env.CACHE_KEY }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build toolchain
        uses: ./.github/actions/kas-build
        with:
          build_stage: "toolchain"
          shared_memory: "no-shm"
          component: "zenoh-toolchain"
          force_rebuild: ${{ inputs.force_rebuild || false }}

  build-zenoh:
    needs: warm-up
    if: ${{ !inputs.components || inputs.components == 'all' || inputs.components == 'zenoh' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        shared_memory: ${{ (inputs.shared_memory == 'shm' && fromJSON('["shm"]')) || (inputs.shared_memory == 'no-shm' && fromJSON('["no-shm"]')) || fromJSON('["shm", "no-shm"]') }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build zenoh
        uses: ./.github/actions/kas-build
        with:
          build_stage: "zenoh"
          shared_memory: ${{ matrix.shared_memory }}
          component: "zenoh"

  build-zenoh-pico:
    needs: warm-up
    if: ${{ !inputs.components || inputs.components == 'all' || inputs.components == 'zenoh-pico' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        shared_memory: ${{ (inputs.shared_memory == 'shm' && fromJSON('["shm"]')) || (inputs.shared_memory == 'no-shm' && fromJSON('["no-shm"]')) || fromJSON('["shm", "no-shm"]') }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build zenoh-pico
        uses: ./.github/actions/kas-build
        with:
          build_stage: "zenoh-pico"
          shared_memory: ${{ matrix.shared_memory }}
          component: "zenoh-pico"

  build-zenoh-c:
    needs: warm-up
    if: ${{ !inputs.components || inputs.components == 'all' || inputs.components == 'zenoh-c' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        shared_memory: ${{ (inputs.shared_memory == 'shm' && fromJSON('["shm"]')) || (inputs.shared_memory == 'no-shm' && fromJSON('["no-shm"]')) || fromJSON('["shm", "no-shm"]') }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build zenoh-c
        uses: ./.github/actions/kas-build
        with:
          build_stage: "zenoh-c"
          shared_memory: ${{ matrix.shared_memory }}
          component: "zenoh-c"

  build-zenoh-cpp:
    needs: [build-zenoh-c, build-zenoh-pico]
    if: ${{ !inputs.components || inputs.components == 'all' || inputs.components == 'zenoh-cpp' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        shared_memory: ${{ (inputs.shared_memory == 'shm' && fromJSON('["shm"]')) || (inputs.shared_memory == 'no-shm' && fromJSON('["no-shm"]')) || fromJSON('["shm", "no-shm"]') }}
        zenoh_cpp_backend: [zenoh-c, zenoh-pico, both]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build zenoh-cpp
        uses: ./.github/actions/kas-build
        with:
          build_stage: "zenoh-cpp"
          shared_memory: ${{ matrix.shared_memory }}
          component: "zenoh-cpp"
          zenoh_cpp_backend: ${{ matrix.zenoh_cpp_backend }}
