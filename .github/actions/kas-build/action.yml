name: "Build Zenoh Recipes"
description: "Build all Zenoh recipes using kas (shm enabled, both backends)"

inputs:
  force_rebuild:
    description: "Force full rebuild (ignore cache)"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install kas
      id: kas
      shell: bash
      run: |
        wget -q https://github.com/siemens/kas/raw/5.0/kas-container -O /tmp/kas
        chmod +x /tmp/kas
        echo "KAS=/tmp/kas" >> "${GITHUB_OUTPUT}"

    - name: Install sccache
      shell: bash
      run: |
        SCCACHE_VERSION="0.14.0"
        mkdir -p "${{ github.workspace }}/bin"
        wget -q "https://github.com/mozilla/sccache/releases/download/v${SCCACHE_VERSION}/sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz" -O /tmp/sccache.tar.gz
        tar -xf /tmp/sccache.tar.gz -C /tmp
        install -m 755 "/tmp/sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache" "${{ github.workspace }}/bin/sccache"
        "${{ github.workspace }}/bin/sccache" --version
        # Mount into /usr/bin so HOSTTOOLS_NONFATAL picks up sccache at
        # BitBake parse time. Must go via --runtime-args on each kas call;
        # kas-container overwrites $KAS_RUNTIME_ARGS at startup (kas 5.0
        # kas-container:342), so the env-var path is ignored.
        echo "SCCACHE_MOUNT=--volume=${{ github.workspace }}/bin/sccache:/usr/bin/sccache:ro" >> "${GITHUB_ENV}"

    - name: Checkout with kas
      shell: bash
      run: |
        ${{ steps.kas.outputs.KAS }} checkout kas/ci.yml:kas/shared-memory.yml:kas/unstable-api.yml

    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        build-mount-path: "${{ github.workspace }}/build"
        root-reserve-mb: 10240
        swap-size-mb: 2048
        remove-dotnet: "true"
        remove-android: "true"
        remove-haskell: "true"
        remove-codeql: "true"

    - name: Restore sstate cache
      if: ${{ inputs.force_rebuild != 'true' }}
      uses: actions/cache/restore@v4
      with:
        path: build/sstate-cache
        key: yocto-sstate-${{ github.ref_name }}-${{ hashFiles('kas/ci.lock.yml') }}
        restore-keys: |
          yocto-sstate-${{ github.ref_name }}-
          yocto-sstate-master-

    - name: Restore downloads cache
      uses: actions/cache/restore@v4
      with:
        path: build/downloads
        key: yocto-downloads-${{ hashFiles('kas/*.yml', 'meta-zenoh/**/*.bb', 'meta-zenoh/**/*.inc') }}
        restore-keys: |
          yocto-downloads-

    - name: Restore sccache
      uses: actions/cache/restore@v4
      with:
        path: build/sccache
        key: sccache-${{ hashFiles('meta-zenoh/**/*-crates.inc') }}
        restore-keys: |
          sccache-

    - name: Build zenoh and zenoh-c (Rust backend)
      shell: bash
      run: |
        ${{ steps.kas.outputs.KAS }} --runtime-args "$SCCACHE_MOUNT" build kas/ci.yml:kas/shared-memory.yml:kas/unstable-api.yml:kas/sccache.yml -- zenoh zenoh-c python3-eclipse-zenoh

    - name: Build zenoh-pico
      shell: bash
      run: |
        ${{ steps.kas.outputs.KAS }} build kas/ci.yml:kas/shared-memory.yml:kas/unstable-api.yml -- zenoh-pico

    - name: Build zenoh-cpp with zenoh-c backend
      shell: bash
      run: |
        ${{ steps.kas.outputs.KAS }} --runtime-args "$SCCACHE_MOUNT" build kas/ci.yml:kas/shared-memory.yml:kas/unstable-api.yml:kas/zenoh-c-backend.yml:kas/sccache.yml -- zenoh-cpp

    - name: Build zenoh-cpp with zenoh-pico backend
      shell: bash
      run: |
        ${{ steps.kas.outputs.KAS }} --runtime-args "$SCCACHE_MOUNT" build kas/ci.yml:kas/shared-memory.yml:kas/unstable-api.yml:kas/zenoh-pico-backend.yml:kas/sccache.yml -- zenoh-cpp

    - name: Show sccache stats
      if: always()
      shell: bash
      run: |
        if [ -x "${{ github.workspace }}/bin/sccache" ]; then
          echo "=== sccache statistics ==="
          SCCACHE_DIR="${{ github.workspace }}/build/sccache" "${{ github.workspace }}/bin/sccache" --show-stats || true
        fi

    - name: Clean sstate duplicates
      shell: bash
      run: |
        SSTATE_SCRIPT="layers/oe-core/scripts/sstate-cache-management.py"
        if [ -f "${SSTATE_SCRIPT}" ]; then
          echo "Cleaning sstate duplicates..."
          python3 "${SSTATE_SCRIPT}" --remove-duplicated --cache-dir=build/sstate-cache -y || true
        fi

    - name: Save sstate cache
      uses: actions/cache/save@v4
      with:
        path: build/sstate-cache
        key: yocto-sstate-${{ github.ref_name }}-${{ hashFiles('kas/ci.lock.yml') }}

    - name: Save downloads cache
      uses: actions/cache/save@v4
      with:
        path: build/downloads
        key: yocto-downloads-${{ hashFiles('kas/*.yml', 'meta-zenoh/**/*.bb', 'meta-zenoh/**/*.inc') }}

    - name: Save sccache
      uses: actions/cache/save@v4
      with:
        path: build/sccache
        key: sccache-${{ hashFiles('meta-zenoh/**/*-crates.inc') }}

    - name: List built RPMs and native components
      shell: bash
      run: |
        echo "=== Built RPM packages ==="
        find build/tmp/deploy/rpm -name '*zenoh*.rpm' \
          -exec echo -e "\n=== {} ===" \; \
          -exec rpm -qp --queryformat "[%-20{=NAME} %{FILENAMES}\n]" {} \; 2>/dev/null || echo "No RPMs found"

        echo -e "\n=== Native sysroot components ==="
        find build/tmp/sysroots-components/x86_64 \
          -maxdepth 1 -type d -name 'zenoh*-native' \
          -exec echo -e "\n=== {} ===" \; \
          -exec tree -L 2 -I sysroot-providers {} \; 2>/dev/null || echo "No native components found"
